        <script type="text/javascript">

                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "font": {"color": "black"}, "id": "aishi", "label": "\u7231\u8bd7\u79d1\u6280", "shape": "dot", "size": 10, "type": "company"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "alibaba", "label": "\u963f\u91cc\u5df4\u5df4", "shape": "dot", "size": 10, "type": "company"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "financing", "label": "29.8\u4ebfC\u8f6e\u878d\u8d44", "shape": "dot", "size": 10, "type": "event"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "aivideo", "label": "AI\u89c6\u9891\u751f\u6210", "shape": "dot", "size": 10, "type": "technology"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "worldmodel", "label": "\u5b9e\u65f6\u4e16\u754c\u6a21\u578b", "shape": "dot", "size": 10, "type": "technology"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "pixverse", "label": "PixVerse R1", "shape": "dot", "size": 10, "type": "product"}]);

                  nodeColors = {};

                  var options = {

            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,

};
