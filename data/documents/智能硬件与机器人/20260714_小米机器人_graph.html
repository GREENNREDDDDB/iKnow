                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "font": {"color": "black"}, "id": "xiaomi", "label": "\u5c0f\u7c73\u673a\u5668\u4eba", "shape": "dot", "size": 10, "type": "company"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "factory", "label": "\u6c7d\u8f66\u5de5\u5382", "shape": "dot", "size": 10, "type": "scene"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "flexible", "label": "\u67d4\u6027\u5de5\u4ef6", "shape": "dot", "size": 10, "type": "task"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "figure", "label": "Figure 03", "shape": "dot", "size": 10, "type": "competitor"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "force", "label": "\u529b\u611f\u77e5\u67d4\u987a", "shape": "dot", "size": 10, "type": "tech"}, {"color": "#97c2fc", "font": {"color": "black"}, "id": "dualarm", "label": "\u53cc\u81c2\u534f\u540c", "shape": "dot", "size": 10, "type": "tech"}]);

                  nodeColors = {};

};
